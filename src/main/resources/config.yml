initial-score: 100
max-score: 100

rating:
  enabled: true
  default-deduction: 10
  require-reason: true
  min-reason-length: 5
  # 1なら通報ごとに即減点。2以上なら同一対象・同一カテゴリの複数ユニーク通報が集まるまで threshold_pending で待機します。
  min-unique-reports-before-deduction: 1
  # 複数通報方式で集計する期間（日数）です。
  report-window-days: 7

categories:
  griefing:
    display-name: "荒らし"
    deduction: 15
    staff-review-required: false

  abusive_chat:
    display-name: "暴言"
    deduction: 5
    staff-review-required: false

  spam:
    display-name: "スパム"
    deduction: 5
    staff-review-required: false

  scam:
    display-name: "詐欺"
    deduction: 10
    staff-review-required: true

  harassment:
    display-name: "嫌がらせ"
    deduction: 10
    staff-review-required: false

  cheating:
    display-name: "チート疑い"
    deduction: 0
    staff-review-required: true

  other:
    display-name: "その他"
    deduction: 0
    staff-review-required: true

cooldowns:
  global-report-seconds: 300
  same-target-cooldown-days: 14
  max-reports-per-day: 5
  max-reports-per-week: 15

report-requirements:
  # 0以下で無効。プレイヤー統計の累計プレイ時間を分単位で判定します。
  min-playtime-minutes: 60
  # 0以下で無効。Mojangアカウント年齢ではなく、ReputationBanが記録するサーバー初参加(first_seen)からの日数です。
  min-account-age-days: 1

score-thresholds:
  warning: 70
  watch: 50
  restricted: 30
  final-warning: 10
  ban: 0

score-recovery:
  enabled: true
  points-per-day: 2
  max-score: 100
  no-report-days-required: 7

audit:
  enabled: true
  export-directory: "exports"
  max-display-limit: 50
  max-export-limit: 1000

retention:
  audit-events-days: 180
  rejected-reports-days: 90
  cancelled-reports-days: 90
  # 0以下なら削除しません。重要履歴はデフォルトで保持します。
  score-history-days: 0
  bans-days: 0

ban:
  enabled: true
  threshold: 0
  source: "ReputationBan"
  durations:
    first: "1d"
    second: "7d"
    third: "30d"
    fourth: "permanent"

notify:
  in-game-staff: true
  console: true
  staff-permission: "reputationban.notify"
  discord-webhook:
    enabled: false
    url: ""
    username: "ReputationBan"
    timeout-seconds: 5
    rate-limit-failure-log-seconds: 60
    include-reasons: true
    include-player-uuids: false
    events:
      report-created: true
      report-approved: true
      report-rejected: true
      score-threshold-crossed: true
      auto-ban: true
      unban: true
      pardon: true
      reporter-penalty: true
      recovery-summary: false

reporter-penalty:
  enabled: true
  false-report-threshold: 5
  report-ban-days: 7

integrations:
  luckperms:
    enabled: true
    use-group-weight: true
    apply-weight-to-deduction: false
    default-weight: 1.0
    group-weights:
      default: 1.0
      trusted: 1.2
      moderator: 2.0
    bypass-groups:
      - admin
      - owner

  coreprotect:
    enabled: true
    minimum-api-version: 11
    report-context:
      enabled: true
      categories:
        - griefing
      lookup-seconds: 3600
      radius: 20
      max-results: 10
      include-actions:
        - block-break
        - block-place

  worldguard:
    enabled: true
    report-context:
      enabled: true
      categories:
        - griefing
        - harassment
      max-regions: 10
      include-region-owners: false
      include-region-members: false
      include-flags:
        - build
        - block-break
        - block-place

  griefprevention:
    enabled: true
    report-context:
      enabled: true
      categories:
        - griefing
        - harassment
        - scam
      include-claim-owner: false
      include-trust-counts: false
      include-boundaries: true

database:
  type: "sqlite"
  file: "reputationban.db"
